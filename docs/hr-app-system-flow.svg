<svg width="1600" height="1080" viewBox="0 0 1600 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1480" y2="1040" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F9FD"/>
      <stop offset="1" stop-color="#E9EEF8"/>
    </linearGradient>
    <linearGradient id="hero" x1="80" y1="40" x2="1520" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#142B57"/>
      <stop offset="1" stop-color="#224584"/>
    </linearGradient>
    <linearGradient id="employeeLane" x1="120" y1="260" x2="1480" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
    <linearGradient id="managerLane" x1="120" y1="610" x2="1480" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5FBF9"/>
      <stop offset="1" stop-color="#ECF8F4"/>
    </linearGradient>
    <linearGradient id="hrLane" x1="120" y1="880" x2="1480" y2="880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9EE"/>
      <stop offset="1" stop-color="#FFF3D7"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1700" height="1200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#16315F" flood-opacity="0.10"/>
    </filter>
    <filter id="softShadow" x="0" y="0" width="1700" height="1200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#16315F" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F3B6D"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0F9F8F"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7791F"/>
    </marker>
    <style>
      .title { font: 700 44px Inter, Arial, sans-serif; fill: #FFFFFF; }
      .subtitle { font: 400 18px Inter, Arial, sans-serif; fill: rgba(255,255,255,0.82); }
      .lane-title { font: 700 28px Inter, Arial, sans-serif; fill: #142B57; }
      .lane-note { font: 400 15px Inter, Arial, sans-serif; fill: #667085; }
      .card-title { font: 700 20px Inter, Arial, sans-serif; fill: #142B57; }
      .card-text { font: 400 14px Inter, Arial, sans-serif; fill: #475467; }
      .tiny { font: 600 12px Inter, Arial, sans-serif; fill: #667085; letter-spacing: 0.08em; }
      .legend { font: 600 13px Inter, Arial, sans-serif; fill: #344054; }
      .flow { font: 700 14px Inter, Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="1080" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="80" y="40" width="1440" height="170" rx="30" fill="url(#hero)"/>
  </g>
  <text x="120" y="108" class="title">HR App System Flow</text>
  <text x="120" y="145" class="subtitle">Current implementation overview for presentation: Employee and Manager experience, approval path, and HR operational control.</text>

  <g transform="translate(1160 86)">
    <rect x="0" y="0" width="300" height="78" rx="20" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.16)"/>
    <circle cx="34" cy="26" r="8" fill="#3FC38F"/>
    <text x="52" y="31" class="legend" fill="#FFFFFF">Employee / Manager</text>
    <circle cx="34" cy="53" r="8" fill="#0F9F8F"/>
    <text x="52" y="58" class="legend" fill="#FFFFFF">Approval Flow</text>
    <circle cx="174" cy="26" r="8" fill="#B7791F"/>
    <text x="192" y="31" class="legend" fill="#FFFFFF">HR / Admin</text>
    <circle cx="174" cy="53" r="8" fill="#D95C63"/>
    <text x="192" y="58" class="legend" fill="#FFFFFF">Output / Monitoring</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="80" y="250" width="1440" height="320" rx="28" fill="url(#employeeLane)"/>
    <rect x="80" y="600" width="1440" height="220" rx="28" fill="url(#managerLane)"/>
    <rect x="80" y="850" width="1440" height="180" rx="28" fill="url(#hrLane)"/>
  </g>

  <text x="120" y="296" class="lane-title">1. Employee / Manager Daily Usage</text>
  <text x="120" y="323" class="lane-note">Manager is treated as employee too, so both can access the same personal modules. Requests are separated into dedicated pages.</text>

  <text x="120" y="646" class="lane-title">2. Manager / Leader Approval Flow</text>
  <text x="120" y="673" class="lane-note">Every attendance request from employee waits for leader approval before it updates attendance, leave, or overtime records.</text>

  <text x="120" y="896" class="lane-title">3. HR / Admin Operational Workspace</text>
  <text x="120" y="923" class="lane-note">HR and Admin monitor company-wide attendance, employee master data, payroll, and reports.</text>

  <g transform="translate(120 360)">
    <rect x="0" y="0" width="240" height="150" rx="24" fill="#FFFFFF" stroke="#D9E2F0"/>
    <text x="28" y="36" class="tiny">START</text>
    <text x="28" y="70" class="card-title">Dashboard</text>
    <text x="28" y="96" class="card-text">Personal attendance graph</text>
    <text x="28" y="118" class="card-text">Check-in shortcut and status</text>
    <circle cx="194" cy="48" r="24" fill="#E9EEF8"/>
    <rect x="183" y="36" width="22" height="22" rx="6" fill="#142B57"/>
  </g>

  <g transform="translate(400 360)">
    <rect x="0" y="0" width="340" height="150" rx="24" fill="#FFFFFF" stroke="#D9E2F0"/>
    <text x="28" y="36" class="tiny">ATTENDANCE MODULE</text>
    <text x="28" y="70" class="card-title">Employee Attendance Hub</text>
    <text x="28" y="96" class="card-text">On Duty, Sick, Leave, Half Day,</text>
    <text x="28" y="118" class="card-text">Submit Overtime, and per-menu records</text>
    <rect x="240" y="28" width="70" height="30" rx="15" fill="#E6F8F5"/>
    <text x="257" y="48" class="legend" fill="#0F9F8F">Request</text>
  </g>

  <g transform="translate(780 332)">
    <rect x="0" y="0" width="290" height="206" rx="24" fill="#FFFFFF" stroke="#D9E2F0"/>
    <text x="26" y="36" class="tiny">REQUEST PAGES</text>
    <text x="26" y="68" class="card-title">Dedicated Submission Pages</text>
    <text x="26" y="96" class="card-text">• On Duty Request</text>
    <text x="26" y="120" class="card-text">• Sick Submission</text>
    <text x="26" y="144" class="card-text">• Leave Request / Half Day</text>
    <text x="26" y="168" class="card-text">• Submit Overtime</text>
    <text x="26" y="192" class="card-text">• Own history per request type</text>
  </g>

  <g transform="translate(1110 360)">
    <rect x="0" y="0" width="370" height="150" rx="24" fill="#FFFFFF" stroke="#D9E2F0"/>
    <text x="28" y="36" class="tiny">PERSONAL SELF VIEW</text>
    <text x="28" y="70" class="card-title">Payroll + Profile</text>
    <text x="28" y="96" class="card-text">Generate slip gaji, history slip gaji,</text>
    <text x="28" y="118" class="card-text">employee data, payroll snapshot, leave overview</text>
    <rect x="274" y="28" width="64" height="30" rx="15" fill="#FFF4DF"/>
    <text x="291" y="48" class="legend" fill="#B7791F">View</text>
  </g>

  <g transform="translate(180 700)">
    <rect x="0" y="0" width="330" height="82" rx="22" fill="#0F9F8F"/>
    <text x="30" y="33" class="tiny" fill="#D7F4EE">APPROVAL LAYER</text>
    <text x="30" y="58" class="card-title" fill="#FFFFFF">Review Request Queue</text>
    <text x="205" y="58" class="legend" fill="#FFFFFF">Approve / Reject</text>
  </g>

  <g transform="translate(570 665)">
    <rect x="0" y="0" width="430" height="120" rx="22" fill="#FFFFFF" stroke="#B8E3D8"/>
    <text x="28" y="34" class="tiny">MANAGER MENU</text>
    <text x="28" y="66" class="card-title">Manager opens the same Attendance Hub</text>
    <text x="28" y="91" class="card-text">Each request page also has approval section for employee submissions.</text>
  </g>

  <g transform="translate(1060 665)">
    <rect x="0" y="0" width="380" height="120" rx="22" fill="#FFFFFF" stroke="#F1D7B0"/>
    <text x="28" y="34" class="tiny">AFTER APPROVAL</text>
    <text x="28" y="66" class="card-title">System updates employee records</text>
    <text x="28" y="91" class="card-text">Attendance record, leave history, overtime status, dashboard summary.</text>
  </g>

  <g transform="translate(130 950)">
    <rect x="0" y="0" width="260" height="44" rx="18" fill="#FFFFFF" stroke="#E5D1AA"/>
    <text x="24" y="28" class="legend">Employee List and Salary Setup</text>
  </g>
  <g transform="translate(430 950)">
    <rect x="0" y="0" width="270" height="44" rx="18" fill="#FFFFFF" stroke="#E5D1AA"/>
    <text x="24" y="28" class="legend">Attendance Monitoring and Reports</text>
  </g>
  <g transform="translate(740 950)">
    <rect x="0" y="0" width="250" height="44" rx="18" fill="#FFFFFF" stroke="#E5D1AA"/>
    <text x="24" y="28" class="legend">Payroll Calculation and Payslip</text>
  </g>
  <g transform="translate(1030 950)">
    <rect x="0" y="0" width="190" height="44" rx="18" fill="#FFFFFF" stroke="#E5D1AA"/>
    <text x="24" y="28" class="legend">Dashboard Insight</text>
  </g>
  <g transform="translate(1260 950)">
    <rect x="0" y="0" width="180" height="44" rx="18" fill="#FFFFFF" stroke="#E5D1AA"/>
    <text x="24" y="28" class="legend">Company Reports</text>
  </g>

  <path d="M360 435 H386" stroke="#1F3B6D" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowNavy)"/>
  <path d="M740 435 H766" stroke="#1F3B6D" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowNavy)"/>
  <path d="M1070 435 H1096" stroke="#1F3B6D" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowNavy)"/>

  <path d="M925 538 V620" stroke="#0F9F8F" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <path d="M345 700 C345 650 615 650 780 650" stroke="#0F9F8F" stroke-width="4" stroke-linecap="round" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M1000 725 H1040" stroke="#0F9F8F" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>

  <path d="M1250 785 V930" stroke="#B7791F" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowAmber)"/>
  <path d="M1265 928 H1265" stroke="#B7791F" stroke-width="4" stroke-linecap="round"/>

  <g transform="translate(820 575)">
    <rect x="0" y="0" width="210" height="34" rx="17" fill="#DBF3EE"/>
    <text x="30" y="22" class="flow" fill="#0F9F8F">Submit request to leader</text>
  </g>

  <g transform="translate(1120 812)">
    <rect x="0" y="0" width="238" height="34" rx="17" fill="#FFF0D6"/>
    <text x="30" y="22" class="flow" fill="#B7791F">Approved data becomes report input</text>
  </g>

  <g transform="translate(1115 250)">
    <rect x="0" y="0" width="365" height="72" rx="22" fill="#FFFFFF" stroke="#D9E2F0"/>
    <text x="26" y="31" class="tiny">CUSTOMER TALK TRACK</text>
    <text x="26" y="54" class="card-text">Employee submits request - Leader approves - System updates records - HR monitors payroll and reports.</text>
  </g>
</svg>
